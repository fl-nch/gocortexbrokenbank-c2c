name: Build and Push to Amazon ECR

on:
  workflow_dispatch:
#  push:
#    branches: [ "main" ]

env:
  AWS_REGION: ap-southeast-2                         # Replace with your AWS Region
  ECR_REPOSITORY: gocortexbrokenbank-c2c                        # Replace with your ECR Repository name
  AWS_ROLE_ARN: arn:aws:iam::570486163909:role/github-actions-deploy-role-sflab-aws-jun26-ekscluster  # Replace with your IAM Role ARN

permissions:
  id-token: write  # Required for requesting the OIDC JWT token
  contents: read   # Required for actions/checkout to read repository contents

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Authenticate to AWS using OIDC
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # Step 3: Authenticate Docker to your private ECR registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Build, Tag, and Push the Image to ECR
    - name: Build, Tag, and Push Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build the container image and tag it with the commit SHA and 'latest'
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Push both tags to AWS ECR
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
