name: cortexcli Container Image Scan

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2                         # Replace with your AWS Region
  ECR_REPOSITORY: gocortexbrokenbank-c2c                        # Replace with your ECR Repository name
  AWS_ROLE_ARN: arn:aws:iam::570486163909:role/github-actions-deploy-role-sflab-aws-jun26-ekscluster  # Replace with your IAM Role ARN
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://api-japac-ccr.xdr.jp.paloaltonetworks.com
  
jobs:
  cortex-code-scan:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout Repository
      uses: actions/checkout@v2
    
    # Step 2: Authenticate to AWS using OIDC
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # Step 3: Authenticate Docker to your private ECR registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Step 4: Pull the latest tag
    - name: Pull Latest Docker Image
      run: docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # Step 5: Install Node.js (prerequisite for Cortex CLI)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Verify Node.js Version
      run: node -v

    # Step 6: Download Cortex CLI
    - name: Download cortexcli
      run: |
        set -x
        crtx_resp=$(curl -s "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
          -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
          -H "Authorization: ${CORTEX_API_KEY}") \
          && crtx_url=$(echo $crtx_resp \
          | jq -r ".signed_url") \
          && crtx_file=$(echo $crtx_resp \
          | jq -r ".file_name") \
          && curl -o $crtx_file $crtx_url 
        chmod +x cortexcli
        ./cortexcli --version

    - name: Run Cortex CLI Container Image Scan
      run: |
        ./cortexcli \
          --api-base-url "${CORTEX_API_URL}" \
          --api-key "${CORTEX_API_KEY}" \
          --api-key-id "${CORTEX_API_KEY_ID}" \
          image scan \
          $ECR_REGISTRY/$ECR_REPOSITORY:latest
