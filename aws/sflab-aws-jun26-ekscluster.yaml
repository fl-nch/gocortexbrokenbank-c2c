AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploys an Amazon EKS Cluster (v1.35) with public subnets routed through an existing Internet Gateway, and an AL2023 Managed Node Group.'

Parameters:
  VpcId:
    Type: 'AWS::EC2::VPC::Id'
    Description: 'The ID of the existing VPC where the new subnets, route table, and EKS Cluster will be deployed.'

  InternetGatewayId:
    Type: String
    Description: 'The ID of the existing Internet Gateway attached to your VPC (e.g., igw-1234567890abcdef0).'

  Subnet1Cidr:
    Type: String
    Default: '10.0.101.0/24'
    Description: 'The CIDR block for the first new subnet (must be within your VPC CIDR range).'

  Subnet1AZ:
    Type: 'AWS::EC2::AvailabilityZone::Name'
    Description: 'The Availability Zone for the first subnet.'

  Subnet2Cidr:
    Type: String
    Default: '10.0.102.0/24'
    Description: 'The CIDR block for the second new subnet (must be within your VPC CIDR range and different from Subnet 1).'

  Subnet2AZ:
    Type: 'AWS::EC2::AvailabilityZone::Name'
    Description: 'The Availability Zone for the second subnet.'

  ClusterName:
    Type: String
    Default: 'my-eks-cluster'
    Description: 'The name of the Amazon EKS cluster.'

  WorkstationIngressCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'The CIDR block allowed to access the EKS API server endpoint (e.g., your public IP address /32).'

  # --- Node Group Configuration Parameters ---
  NodeInstanceType:
    Type: String
    Default: 't3.medium'
    Description: 'The EC2 instance type for the EKS worker nodes.'

  NodeAutoScalingMin:
    Type: Number
    Default: 1
    Description: 'The minimum number of worker nodes.'

  NodeAutoScalingMax:
    Type: Number
    Default: 3
    Description: 'The maximum number of worker nodes.'

  NodeAutoScalingDesired:
    Type: Number
    Default: 2
    Description: 'The desired number of worker nodes.'

Resources:
  # --- Subnets ---
  EKSSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref Subnet1Cidr
      AvailabilityZone: !Ref Subnet1AZ
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-subnet-1'
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: 'shared'
        - Key: 'kubernetes.io/role/elb'
          Value: '1'
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
        - Key: yor_trace
          Value: 733090a1-68b1-4ca8-9ee6-3b145742bd24
        - Key: yor_name
          Value: EKSSubnet1
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_org
          Value: fl-nch
        - Key: git_modifiers
          Value: 156729790+fl-nch
  EKSSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref Subnet2Cidr
      AvailabilityZone: !Ref Subnet2AZ
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-subnet-2'
        - Key: !Sub 'kubernetes.io/cluster/${ClusterName}'
          Value: 'shared'
        - Key: 'kubernetes.io/role/elb'
          Value: '1'
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
        - Key: yor_trace
          Value: 4970d4c7-85ea-4c02-aa2a-0958dcf795e6
        - Key: yor_name
          Value: EKSSubnet2
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_org
          Value: fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"

  # --- Routing Setup using Existing Internet Gateway ---
  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ClusterName}-public-rt'
        - Key: yor_name
          Value: PublicRouteTable
        - Key: git_org
          Value: fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: yor_trace
          Value: ebe68a98-ad14-4b60-8586-9aa56f8d6f2c
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
  PublicRoute:
    Type: 'AWS::EC2::Route'
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGatewayId
  Subnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref EKSSubnet1
      RouteTableId: !Ref PublicRouteTable
  Subnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref EKSSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --- IAM Role for EKS Control Plane ---
  EKSClusterRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'eks.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonEKSClusterPolicy'
      Tags:
        - Key: yor_trace
          Value: e3d9692b-d19e-4c41-8ba1-6304b72e889d
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
        - Key: yor_name
          Value: EKSClusterRole
        - Key: git_org
          Value: fl-nch
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml

  # --- Security Group for the Control Plane ---
  ClusterControlPlaneSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security Group for EKS Control Plane communication'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref WorkstationIngressCidr
          Description: 'Allow workstation to communicate with the cluster API Server'
      Tags:
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: yor_name
          Value: ClusterControlPlaneSecurityGroup
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_org
          Value: fl-nch
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: yor_trace
          Value: f637d313-5ed5-4fb8-a106-cd6a33643484
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298

  # --- EKS Cluster Resource ---
  EKSCluster:
    Type: 'AWS::EKS::Cluster'
    Properties:
      Name: !Ref ClusterName
      Version: '1.35'
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref ClusterControlPlaneSecurityGroup
        SubnetIds:
          - !Ref EKSSubnet1
          - !Ref EKSSubnet2

  # --- Managed Add-ons ---
  VpcCniAddon:
    Type: 'AWS::EKS::Addon'
    Properties:
      AddonName: 'vpc-cni'
      ClusterName: !Ref EKSCluster
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: yor_trace
          Value: 323699c8-ccc7-4028-a6b0-44c5f197a4bb
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: yor_name
          Value: VpcCniAddon
        - Key: git_org
          Value: fl-nch
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
  CoreDnsAddon:
    Type: 'AWS::EKS::Addon'
    Properties:
      AddonName: 'coredns'
      ClusterName: !Ref EKSCluster
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
        - Key: yor_trace
          Value: ba1cc55b-cb8f-4006-95c6-241745208d91
        - Key: yor_name
          Value: CoreDnsAddon
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_org
          Value: fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
  KubeProxyAddon:
    Type: 'AWS::EKS::Addon'
    Properties:
      AddonName: 'kube-proxy'
      ClusterName: !Ref EKSCluster
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: yor_trace
          Value: 1f250163-3b9d-45e5-a9b0-89034ca4874e
        - Key: yor_name
          Value: KubeProxyAddon
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"
        - Key: git_org
          Value: fl-nch
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298

  # --- IAM Role for EKS Worker Nodes ---
  EKSNodeRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'ec2.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy'
        - 'arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy'
        - 'arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly'
      Tags:
        - Key: git_commit
          Value: 307c4cea96825fbc28ea736c256f7a75ad3ca298
        - Key: yor_trace
          Value: 42fa5485-aa27-47ae-a975-fc86b0077e9c
        - Key: yor_name
          Value: EKSNodeRole
        - Key: git_last_modified_by
          Value: 156729790+fl-nch@users.noreply.github.com
        - Key: git_file
          Value: aws/sflab-aws-jun26-ekscluster.yaml
        - Key: git_repo
          Value: gocortexbrokenbank-c2c
        - Key: git_org
          Value: fl-nch
        - Key: git_modifiers
          Value: 156729790+fl-nch
        - Key: git_last_modified_at
          Value: "2026-06-17 02:17:28"

  # --- Managed Node Group ---
  EKSManagedNodeGroup:
    Type: 'AWS::EKS::Nodegroup'
    DependsOn:
      - VpcCniAddon
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub '${ClusterName}-node-group'
      NodeRole: !GetAtt EKSNodeRole.Arn
      Subnets:
        - !Ref EKSSubnet1
        - !Ref EKSSubnet2
      AmiType: 'AL2023_x86_64_STANDARD' # Standard Amazon Linux 2023 for EKS 1.35 cgroup v2 compatibility
      InstanceTypes:
        - !Ref NodeInstanceType
      ScalingConfig:
        MinSize: 1
        MaxSize: 3
        DesiredSize: 2
      Tags:
        git_repo: gocortexbrokenbank-c2c
        git_modifiers: 156729790+fl-nch
        git_last_modified_by: 156729790+fl-nch@users.noreply.github.com
        git_last_modified_at: "2026-06-17 02:57:01"
        git_commit: 3c1683202edd4ee99f5a3927f87ddac4fd0f2789
        yor_name: EKSManagedNodeGroup
        git_org: fl-nch
        git_file: aws/sflab-aws-jun26-ekscluster.yaml
        yor_trace: f40561e0-f5fb-4adf-ab5b-96cb3ed97fb3

Outputs:
  ClusterName:
    Description: 'The EKS Cluster Name'
    Value: !Ref EKSCluster
  ClusterArn:
    Description: 'The Amazon Resource Name (ARN) of the EKS Cluster'
    Value: !GetAtt EKSCluster.Arn
  ClusterEndpoint:
    Description: 'The endpoint for your EKS Kubernetes API server'
    Value: !GetAtt EKSCluster.Endpoint
  CreatedSubnet1Id:
    Description: 'The Subnet ID of the first newly created subnet'
    Value: !Ref EKSSubnet1
  CreatedSubnet2Id:
    Description: 'The Subnet ID of the second newly created subnet'
    Value: !Ref EKSSubnet2
